server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Necesario para que Angular Router maneje las rutas (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para archivos estaticos
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
    }
}
